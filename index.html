<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrajetGuenette - Officiel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: #1b5e20; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .trajet { background: white; padding: 15px; margin-top: 15px; border-radius: 10px; border-left: 6px solid #ef6c00; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .nom-chauffeur { color: #1b5e20; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div id="login-zone">
    <div class="card">
        <h2>🕌 Connexion</h2>
        <input type="text" id="u_nom" placeholder="Ton Nom et Prénom">
        <input type="email" id="u_email" placeholder="Ton adresse Email">
        <input type="password" id="u_code" placeholder="Code secret (1234)">
        <button onclick="connexion()">Entrer</button>
    </div>
</div>

<div id="app-zone" style="display:none;">
    <div class="card">
        <h3>🚗 Proposer un trajet</h3>
        <p id="bienvenue" style="font-size: 14px; color: #666;"></p>
        <input type="text" id="dep" placeholder="📍 Départ (ex: Rue Guenette)">
        <input type="text" id="dest" placeholder="🏁 Arrivée (ex: Mosquée)">
        <input type="tel" id="tel_chauffeur" placeholder="📱 Ton Téléphone">
        <input type="text" id="prix_trajet" placeholder="💰 Prix (ex: Gratuit)">
        <button onclick="publier()">Publier l'offre</button>
    </div>
    <div id="liste-trajets" style="max-width: 400px; margin: 20px auto;"></div>
</div>

<script>
    const SB_URL = "https://ksbzyqmdmqfpsgvrhrah.supabase.co";
    const SB_KEY = "sb_publishable_K7nSAQpM6rO_G_I3hG_Rvhrah";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    
    let emailSession = "";
    let nomSession = "";

    function connexion() {
        const nom = document.getElementById('u_nom').value;
        const mail = document.getElementById('u_email').value;
        const code = document.getElementById('u_code').value;

        if(nom.length > 2 && mail.includes('@') && code === "1234") {
            nomSession = nom;
            emailSession = mail;
            document.getElementById('login-zone').style.display = "none";
            document.getElementById('app-zone').style.display = "block";
            document.getElementById('bienvenue').innerText = "Ravi de vous voir, " + nomSession;
            chargerTrajets();
        } else { alert("Merci de remplir Nom, Email et Code (1234) correctement."); }
    }

    async function chargerTrajets() {
        const { data } = await supabaseClient.from('trajets').select('*').order('id', {ascending: false});
        const div = document.getElementById('liste-trajets');
        div.innerHTML = "<h3>Trajets disponibles :</h3>";
        data.forEach(t => {
            div.innerHTML += `
                <div class="trajet">
                    <div class="nom-chauffeur">👤 ${t.nom || 'Anonyme'}</div>
                    <strong>${t.depart} ➔ ${t.destination}</strong><br>
                    <span style="font-weight:bold; color:#1b5e20;">Prix: ${t.prix || 'Gratuit'}</span><br>
                    <button style="background:#ef6c00; margin-top:10px;" onclick="reserver(${t.id}, '${t.phone}', '${t.nom}')">Réserver</button>
                </div>`;
        });
    }

    async function publier() {
        const d = document.getElementById('dep').value;
        const s = document.getElementById('dest').value;
        const p = document.getElementById('tel_chauffeur').value;
        const pr = document.getElementById('prix_trajet').value;

        if(!d || !s || !p) return alert("Remplis tous les champs !");

        await supabaseClient.from('trajets').insert([{ 
            depart: d, destination: s, phone: p, email: emailSession, nom: nomSession, prix: pr 
        }]);
        alert("Annonce publiée !");
        chargerTrajets();
    }

    async function reserver(idTrajet, telChauffeur, nomChauffeur) {
        const telPassager = prompt("Ton téléphone pour que " + nomChauffeur + " puisse te rappeler :");
        if(!telPassager) return;

        await supabaseClient.from('reservations').insert([
            { trajet_id: idTrajet, passager_email: emailSession, passager_nom: nomSession, passager_phone: telPassager }
        ]);

        alert("Réservation notée dans le système !");
        window.location.href = "sms:" + telChauffeur + "?body=Salut " + nomChauffeur + ", c'est " + nomSession + ". J'ai réservé ton trajet sur l'app !";
    }
</script>
</body>
</html>
