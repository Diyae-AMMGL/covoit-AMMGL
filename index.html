<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrajetGuenette - Officiel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 450px; margin: auto; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; background: white; }
        button { width: 100%; background: #1b5e20; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #2e7d32; }
        #map { height: 250px; width: 100%; border-radius: 10px; margin-top: 10px; border: 2px solid #1b5e20; }
        .trajet { background: white; padding: 15px; margin-top: 15px; border-radius: 10px; border-left: 6px solid #ef6c00; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        label { font-size: 12px; color: #1b5e20; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="login-zone">
    <div class="card">
        <h2 style="color: #1b5e20; text-align: center;">🕌 Connexion</h2>
        <input type="text" id="u_nom" placeholder="Ton Nom et Prénom">
        <input type="email" id="u_email" placeholder="Ton adresse Email">
        <input type="password" id="u_code" placeholder="Code secret">
        <button onclick="connexion()">Accéder à l'application</button>
    </div>
</div>

<div id="app-zone" style="display:none;">
    <div class="card">
        <h3 style="margin-top:0; color:#1b5e20;">🚗 Proposer un trajet</h3>
        <label>📍 Départ / 🏁 Destination</label>
        <select id="dep"><option value="Mosquée">Mosquée (39 Rue Guenette)</option></select>
        <select id="dest">
            <option value="Tim Hortons Charny">Tim Hortons Charny</option>
            <option value="Couche-Tard St-Romuald">Couche-Tard St-Romuald</option>
            <option value="Galeries Chagnon">Galeries Chagnon</option>
        </select>
        <input type="tel" id="tel_chauffeur" placeholder="Ton Téléphone">
        <button onclick="publier()">Publier</button>
        
        <div id="map"></div>
    </div>
    <div id="liste-trajets" style="max-width: 450px; margin: 20px auto;"></div>
</div>

<script>
    // Config Supabase (Tes identifiants)
    const SB_URL = "https://ksbzyqmdmqfpsgvrhrah.supabase.co";
    const SB_KEY = "sb_publishable_K7nSAQpM6rO_G_I3hG_Rvhrah";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    
    let map, marker;
    const coords = {
        "Mosquée": [46.7565, -71.2500],
        "Tim Hortons Charny": [46.7210, -71.2750],
        "Couche-Tard St-Romuald": [46.7550, -71.2350],
        "Galeries Chagnon": [46.8040, -71.1780]
    };

    function initMap() {
        map = L.map('map').setView([46.7565, -71.2500], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        marker = L.marker([46.7565, -71.2500]).addTo(map).bindPopup("Mosquée Guenette").openPopup();
    }

    function connexion() {
        if(document.getElementById('u_code').value === "0000") {
            document.getElementById('login-zone').style.display = "none";
            document.getElementById('app-zone').style.display = "block";
            initMap();
            chargerTrajets();
        } else { alert("Code incorrect"); }
    }

    // Le reste de tes fonctions (chargerTrajets, publier, reserver) reste identique
    // mais tu peux ajouter marker.setLatLng(coords[destination]) pour déplacer le point rouge !
</script>
</body>
</html>
